<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pro - Clean Code Edition</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <main class="app">
    <section class="header">
      <h1>Controle Financeiro</h1>
      <p>ADS Modular System</p>
    </section>

    <section class="cards">
      <div class="card"><span>Saldo Período</span><strong id="saldo">R$ 0,00</strong></div>
      <div class="card meta-container">
        <span>Meta Mensal</span>
        <input type="number" id="inputMeta" placeholder="R$ 0,00" onchange="App.handleMetaChange()">
        <div class="progress-bg"><div id="progress-bar"></div></div>
        <small id="statusMeta"></small>
      </div>
    </section>

    <div class="relatorios-box" style="display:flex; gap:10px; margin: 15px 0;">
        <button onclick="App.exportPDF()" style="flex:1; background:#ef4444;">PDF</button>
        <button onclick="App.exportExcel()" style="flex:1; background:#10b981;">Excel</button>
    </div>

    <section class="form-box">
      <h2 id="tituloForm">Novo Lançamento</h2>
      <input type="text" id="descricao" placeholder="Descrição" />
      <input type="number" id="valor" placeholder="Valor R$" />
      <div class="form-row" style="display:flex; gap:10px; margin-bottom:10px;">
        <select id="tipo" style="flex:1;"><option value="saida">Gasto</option><option value="entrada">Entrada</option></select>
        <select id="categoriaManual" style="flex:1;">
            <option value="">Automática</option><option>Alimentação</option><option>Transporte</option>
            <option>Mercado</option><option>Lazer</option><option>Casa</option><option>Renda</option>
        </select>
      </div>
      <label style="color:#fff; display:flex; align-items:center; gap:8px; margin-bottom:15px;">
          <input type="checkbox" id="recorrente"> Gasto Fixo (Recorrente)
      </label>
      <button id="btnSalvar" onclick="App.handleSave()">Adicionar</button>
    </section>

    <section class="dashboard">
      <div class="filtros-topo" style="display:flex; gap:10px; margin-bottom:20px;">
        <select id="filtroMes" onchange="App.updateUI()"></select>
        <select id="filtroAno" onchange="App.updateUI()"></select>
      </div>

      <div id="alertaRecorrencia" class="alerta" style="display:none;">
        <p>Importar fixos para este mês?</p>
        <button onclick="App.importRecurring()">Sim, importar</button>
      </div>

      <div class="graficos-grid">
        <canvas id="meuGrafico"></canvas>
        <div style="height:250px; width:100%;"><canvas id="graficoLinha"></canvas></div>
      </div>
      <div id="resumoCategorias" style="margin-top:20px;"></div>
    </section>

    <section class="extrato">
      <input type="text" id="inputBusca" placeholder="🔍 Buscar..." oninput="App.updateUI()">
      <div id="listaLancamentos"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Injetando funções no objeto global App para que o script.js as use
    window.DB = {
        saveTransactions: (data) => set(ref(db, 'transacoes/'), data),
        saveMeta: (val) => set(ref(db, 'configuracoes/meta'), val),
        onDataChange: (callback) => onValue(ref(db, 'transacoes/'), (s) => callback(s.val())),
        onMetaChange: (callback) => onValue(ref(db, 'configuracoes/meta'), (s) => callback(s.val()))
    };
  </script>
</body>
</html>
