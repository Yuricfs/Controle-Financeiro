<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pro - ADS Full</title>
  <link rel="stylesheet" href="style.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <main class="app">
    <section class="header">
      <h1>Controle Financeiro</h1>
      <p>Gestão Profissional e Inteligente</p>
    </section>

    <section class="cards">
      <div class="card"><span>Saldo do Mês</span><strong id="saldo">R$ 0,00</strong></div>
      <div class="card meta-container">
        <span>Meta Mensal de Gastos</span>
        <input type="number" id="inputMeta" placeholder="Definir R$" onchange="App.handleMetaChange()">
        <div class="progress-bg"><div id="progress-bar"></div></div>
        <small id="statusMeta"></small>
      </div>
    </section>

    <section class="cards">
      <div class="card entrada"><span>Ganhos</span><strong id="totalEntradas">R$ 0,00</strong></div>
      <div class="card saida"><span>Gastos</span><strong id="totalSaidas">R$ 0,00</strong></div>
    </section>

    <section class="relatorios" style="display:flex; gap:10px; margin: 15px 0;">
        <button onclick="App.exportPDF()" style="flex:1; background:#dc2626; color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">📄 Exportar PDF</button>
        <button onclick="App.exportExcel()" style="flex:1; background:#16a34a; color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">📊 Exportar Excel</button>
    </section>

    <section class="form-box">
      <h2 id="tituloForm">Novo Lançamento</h2>
      <input type="text" id="descricao" placeholder="Descrição (ex: i30, iFood, Pix)" />
      <input type="number" id="valor" placeholder="Valor R$" />
      
      <div class="form-row" style="display:flex; gap:10px; margin-bottom:10px;">
        <select id="tipo" style="flex:1;">
          <option value="saida">Gasto</option>
          <option value="entrada">Entrada</option>
        </select>
        <select id="categoriaManual" style="flex:1;">
          <option value="">Categoria Auto</option>
          <option>Alimentação</option><option>Transporte</option><option>Mercado</option>
          <option>Lazer</option><option>Casa</option><option>Saúde</option>
          <option>Assinaturas</option><option>Renda</option>
        </select>
      </div>

      <label style="color:#fff; display:flex; align-items:center; gap:8px; margin-bottom:15px; font-size:0.85rem;">
          <input type="checkbox" id="recorrente" style="width:auto;"> Gasto Fixo (Recorrente)
      </label>

      <button id="btnSalvar" onclick="App.handleSave()" style="width:100%; padding:15px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Adicionar Lançamento</button>
    </section>

    <section class="dashboard">
      <div class="filtros-topo" style="display:flex; gap:10px; margin-bottom:25px; justify-content:center;">
        <select id="filtroMes" onchange="App.updateUI()"></select>
        <select id="filtroAno" onchange="App.updateUI()"></select>
      </div>

      <div id="alertaRecorrencia" style="display:none; background:#2563eb; color:#fff; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center;">
        <p>Mês novo! Deseja importar seus gastos fixos?</p>
        <button onclick="App.importRecurring()" style="background:#fff; color:#2563eb; border:none; padding:8px 15px; border-radius:5px; margin-top:10px; font-weight:bold; cursor:pointer;">Sim, importar agora</button>
      </div>

      <div class="graficos-grid" style="display:flex; flex-direction:column; gap:40px;">
        <div style="max-width:320px; margin:0 auto; width:100%;"><canvas id="meuGrafico"></canvas></div>
        <div style="width:100%; height:280px; background: rgba(255,255,255,0.03); border-radius:12px; padding:10px;"><canvas id="graficoLinha"></canvas></div>
      </div>

      <div id="resumoCategorias" style="margin-top:30px;"></div>
    </section>

    <section class="extrato">
      <input type="text" id="inputBusca" placeholder="🔍 Pesquisar no histórico..." oninput="App.updateUI()" style="margin-bottom:20px; width:100%; padding:12px; border-radius:8px; background:#1e293b; color:#fff; border:1px solid #334155;">
      
      <div class="extrato-topo" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">Extrato</h2>
        <button onclick="App.clearAll()" style="background:#444; color:#fff; border:none; padding:6px 12px; border-radius:6px; font-size:0.8rem; cursor:pointer;">Limpar Tudo</button>
      </div>
      <div id="listaLancamentos"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    window.DB = {
        saveTransactions: (data) => set(ref(db, 'transacoes/'), data),
        saveMeta: (val) => set(ref(db, 'configuracoes/meta'), val),
        onDataChange: (cb) => onValue(ref(db, 'transacoes/'), (s) => cb(s.val())),
        onMetaChange: (cb) => onValue(ref(db, 'configuracoes/meta'), (s) => cb(s.val()))
    };
  </script>
</body>
</html>
