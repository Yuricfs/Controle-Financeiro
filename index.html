<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro Pro | Dashboard</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <div id="auth-container">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-wallet"></i></div>
        <h1 id="auth-title">Bem-vindo</h1>
        <p id="auth-subtitle">Acesse seu controle financeiro seguro</p>
        
        <div id="login-form">
            <div id="group-nome" class="input-icon-group" style="display: none;">
                <i class="fas fa-user"></i>
                <input type="text" id="nome-cadastro" placeholder="Nome Completo">
            </div>
            <div class="input-icon-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email-login" placeholder="E-mail">
            </div>
            <div class="input-icon-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="pass-login" placeholder="Senha">
                <i class="fas fa-eye" id="togglePassword" onclick="App.togglePasswordVisibility()"></i>
            </div>
            <div id="login-error-msg"></div>
            <button id="btn-entrar" class="btn-primary" onclick="App.handleAuthAction()">Entrar</button>
            <p id="toggle-auth-text">Ainda não tem conta? <a href="#" onclick="App.toggleAuthMode()">Cadastre-se</a></p>
            <div class="divider"><span>OU</span></div>
            <button class="btn-google" onclick="App.handleGoogleAuth()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Entrar com Google
            </button>
        </div>
    </div>
  </div>

  <main id="app-content" style="display: none;">
    <header class="main-header">
      <div class="user-info">
        <h1>Financeiro<span>Pro</span></h1>
        <p id="user-welcome"></p>
      </div>
      <button class="btn-logout" onclick="App.handleLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </header>

    <div class="dashboard-grid">
      
      <aside class="sidebar">
        <div class="card main-balance">
          <span>Saldo Disponível</span>
          <strong id="saldo">R$ 0,00</strong>
        </div>

        <div class="summary-cards">
          <div class="card entrada">
            <span><i class="fas fa-arrow-up"></i> Ganhos</span>
            <strong id="totalEntradas">R$ 0,00</strong>
          </div>
          <div class="card saida">
            <span><i class="fas fa-arrow-down"></i> Gastos</span>
            <strong id="totalSaidas">R$ 0,00</strong>
          </div>
        </div>

        <div class="card meta-box">
          <div class="meta-header">
            <span><i class="fas fa-bullseye"></i> Meta do Mês</span>
            <input type="number" id="inputMeta" placeholder="Definir R$" onchange="App.handleMetaChange()">
          </div>
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
          <small id="statusMeta"></small>
        </div>

        <div class="card form-container">
          <h3>Novo Lançamento</h3>
          <div class="form-group">
            <input type="text" id="descricao" placeholder="Descrição (ex: Peças i30)">
            <input type="number" id="valor" placeholder="Valor R$">
            <div class="input-row">
              <select id="tipo"><option value="saida">Gasto</option><option value="entrada">Entrada</option></select>
              <select id="categoriaManual">
                <option value="">Categoria Auto</option>
                <option>Alimentação</option><option>Transporte</option><option>Mercado</option><option>Lazer</option><option>Casa</option><option>Renda</option>
              </select>
            </div>
            <label class="check-container">
              <input type="checkbox" id="recorrente"> Gasto Fixo Mensal
            </label>
            <button class="btn-add" onclick="App.handleSave()"><i class="fas fa-plus"></i> Salvar</button>
          </div>
        </div>
      </aside>

      <section class="main-content">
        <div class="card report-actions">
            <button onclick="App.exportPDF()" class="btn-pdf"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
            <button onclick="App.exportExcel()" class="btn-excel"><i class="fas fa-file-excel"></i> Exportar Excel</button>
        </div>

        <div class="dashboard-visuals">
          <div class="card chart-box">
            <h3>Divisão de Gastos</h3>
            <canvas id="meuGrafico"></canvas>
          </div>
          <div class="card chart-box">
            <h3>Fluxo de Caixa Diário</h3>
            <canvas id="graficoLinha"></canvas>
          </div>
        </div>

        <div class="card category-list">
          <h3>Gastos por Categoria</h3>
          <div id="resumoCategorias"></div>
        </div>

        <div class="card history-container">
          <div class="history-header">
            <h3>Histórico de Lançamentos</h3>
            <div class="history-filters">
              <select id="filtroMes" onchange="App.updateUI()"></select>
              <select id="filtroAno" onchange="App.updateUI()"></select>
            </div>
          </div>
          <input type="text" id="inputBusca" placeholder="Pesquisar descrição..." oninput="App.updateUI()" class="search-input">
          <div id="listaLancamentos"></div>
          <button class="btn-clear" onclick="App.clearAll()">Zerar Dados do Mês</button>
        </div>
      </section>

    </div>
  </main>

  <script src="script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.FB = {
      save: (uid, data) => set(ref(db, `users/${uid}/transacoes`), data),
      saveMeta: (uid, val) => set(ref(db, `users/${uid}/meta`), val),
      savePerfil: (uid, nome) => set(ref(db, `users/${uid}/perfil`), { nome }),
      listen: (uid, cbData, cbMeta) => {
        onValue(ref(db, `users/${uid}/transacoes`), s => cbData(s.val()));
        onValue(ref(db, `users/${uid}/meta`), s => cbMeta(s.val()));
      },
      getPerfil: (uid) => get(ref(db, `users/${uid}/perfil`))
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById("auth-container").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        App.setUser(user);
        const snapshot = await window.FB.getPerfil(user.uid);
        const nome = snapshot.exists() ? snapshot.val().nome : (user.displayName || user.email.split('@')[0]);
        document.getElementById("user-welcome").innerText = `Bem-vindo, ${nome}`;
      } else {
        document.getElementById("auth-container").style.display = "flex";
        document.getElementById("app-content").style.display = "none";
      }
    });

    window.AuthActions = {
      google: () => signInWithPopup(auth, provider),
      login: (e, p) => signInWithEmailAndPassword(auth, e, p),
      register: (e, p) => createUserWithEmailAndPassword(auth, e, p),
      logout: () => signOut(auth)
    };
  </script>
</body>
</html>
