<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pro</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <main class="app">
    <section class="header">
      <h1>Controle Financeiro</h1>
      <p>Seu painel financeiro pessoal</p>
    </section>

    <section class="cards">
      <div class="card">
        <span>Saldo do Período</span>
        <strong id="saldo">R$ 0,00</strong>
      </div>
      <div class="card entrada">
        <span>Entradas</span>
        <strong id="totalEntradas">R$ 0,00</strong>
      </div>
      <div class="card saida">
        <span>Gastos</span>
        <strong id="totalSaidas">R$ 0,00</strong>
      </div>
    </section>

    <section class="form-box">
      <h2>Nova movimentação</h2>
      <input type="text" id="descricao" placeholder="Descrição (ex: i30, Supermercado)" />
      <input type="number" id="valor" placeholder="Valor" />
      <select id="tipo">
        <option value="saida">Gasto</option>
        <option value="entrada">Entrada</option>
      </select>
      <select id="categoriaManual">
        <option value="">Categoria automática</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Mercado</option>
        <option>Saúde</option>
        <option>Lazer</option>
        <option>Casa</option>
        <option>Assinaturas</option>
        <option>Renda</option>
        <option>Outros</option>
      </select>
      <button onclick="window.adicionarLancamento()">Adicionar</button>
    </section>

    <section class="dashboard">
      <h2>Análise de Período</h2>
      
      <div class="filtros" style="display: flex; gap: 10px; margin-bottom: 25px; justify-content: center;">
        <select id="filtroMes" onchange="window.atualizarTela()"></select>
        <select id="filtroAno" onchange="window.atualizarTela()"></select>
      </div>

      <div class="graficos-grid" style="display: flex; flex-direction: column; gap: 40px;">
        <div style="max-width: 350px; margin: 0 auto; width: 100%;">
          <canvas id="meuGrafico"></canvas>
        </div>
        <div style="width: 100%; height: 300px;">
          <canvas id="graficoLinha"></canvas>
        </div>
      </div>

      <div id="resumoCategorias" style="margin-top: 20px;"></div>
    </section>

    <section class="extrato">
      <div class="extrato-topo">
        <h2>Extrato</h2>
        <button class="limpar" onclick="window.limparTudo()">Limpar tudo</button>
      </div>
      <div id="listaLancamentos"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714",
      measurementId: "G-1E3VZN227W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes/');

    window.salvarNoFirebase = (dados) => set(dbRef, dados);

    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      if (typeof window.atualizarInterface === 'function') {
        window.atualizarInterface(data || []);
      }
    });
  </script>
</body>
</html>
