<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pro</title>
  <link rel="stylesheet" href="style.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <main class="app">
    <section class="header">
      <h1>Controle Financeiro</h1>
      <p>Gestão de Dados Inteligente</p>
    </section>

    <section class="cards">
      <div class="card">
        <span>Saldo Período</span>
        <strong id="saldo">R$ 0,00</strong>
      </div>
      <div class="card meta-container">
        <span>Meta Mensal de Gastos</span>
        <input type="number" id="inputMeta" placeholder="Definir R$" onchange="window.salvarMeta()">
        <div class="progress-bg"><div id="progress-bar"></div></div>
        <small id="statusMeta"></small>
      </div>
    </section>

    <section class="relatorios" style="display: flex; gap: 10px; margin: 15px 0;">
        <button onclick="window.exportarPDF()" style="flex: 1; background: #dc2626;">📄 PDF</button>
        <button onclick="window.exportarExcel()" style="flex: 1; background: #16a34a;">📊 Excel</button>
    </section>

    <section class="form-box">
      <h2 id="tituloForm">Novo Lançamento</h2>
      <input type="text" id="descricao" placeholder="O que foi? (ex: Mercado, Peças)" />
      <input type="number" id="valor" placeholder="Valor R$" />
      
      <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
        <select id="tipo" style="flex: 1;">
          <option value="saida">Gasto</option>
          <option value="entrada">Entrada</option>
        </select>
        <select id="categoriaManual" style="flex: 1;">
          <option value="">Automática</option>
          <option>Alimentação</option>
          <option>Transporte</option>
          <option>Mercado</option>
          <option>Lazer</option>
          <option>Casa</option>
          <option>Renda</option>
        </select>
      </div>

      <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #fff;">
        <input type="checkbox" id="recorrente" style="width: auto;"> 
        <label for="recorrente">Gasto Fixo (Recorrente)</label>
      </div>

      <button id="btnSalvar" onclick="window.adicionarLancamento()">Adicionar</button>
    </section>

    <section class="dashboard">
      <div class="filtros-topo" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <select id="filtroMes" onchange="window.atualizarTela()"></select>
        <select id="filtroAno" onchange="window.atualizarTela()"></select>
      </div>

      <div id="alertaRecorrencia" style="display:none; background: #2563eb; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
        <p>Mês novo! Importar gastos fixos?</p>
        <button onclick="window.importarRecorrentes()" style="background: white; color: #2563eb; border: none; padding: 5px 10px; border-radius: 4px; margin-top: 8px; cursor: pointer; font-weight: bold;">Sim, importar</button>
      </div>

      <div class="graficos-grid" style="display: flex; flex-direction: column; gap: 30px;">
        <div style="max-width: 300px; margin: 0 auto; width: 100%;"><canvas id="meuGrafico"></canvas></div>
        <div style="width: 100%; height: 260px;"><canvas id="graficoLinha"></canvas></div>
      </div>

      <div id="resumoCategorias" style="margin-top: 25px;"></div>
    </section>

    <section class="extrato">
      <input type="text" id="inputBusca" placeholder="🔍 Buscar no extrato..." oninput="window.atualizarTela()" style="margin-bottom: 15px;">
      <div class="extrato-topo">
        <h2>Extrato</h2>
        <button class="limpar" onclick="window.limparTudo()">Zerar Dados</button>
      </div>
      <div id="listaLancamentos"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714",
      measurementId: "G-1E3VZN227W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes/');
    const metaRef = ref(db, 'configuracoes/meta');

    window.salvarNoFirebase = (dados) => set(dbRef, dados);
    window.salvarMetaFirebase = (valor) => set(metaRef, valor);

    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      if (typeof window.atualizarInterface === 'function') window.atualizarInterface(data || []);
    });

    onValue(metaRef, (snapshot) => {
      const valor = snapshot.val();
      if (valor !== null) {
        const inputMeta = document.getElementById("inputMeta");
        if (inputMeta) inputMeta.value = valor;
        window.atualizarTela();
      }
    });
  </script>
</body>
</html>
