<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro Pessoal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <main class="app">
    <section class="dashboard">
      <h2>Resumo por categoria</h2>
      <div id="resumoCategorias"></div>
      
      <div style="max-width: 300px; margin: 20px auto;">
        <canvas id="meuGrafico"></canvas>
      </div>
    </section>

    </main>

  <script src="script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPpIzV3uNNCl0A9lbGuOLjEiSqI0cTW5I",
      authDomain: "controle-pessoal-bec71.firebaseapp.com",
      databaseURL: "https://controle-pessoal-bec71-default-rtdb.firebaseio.com",
      projectId: "controle-pessoal-bec71",
      storageBucket: "controle-pessoal-bec71.firebasestorage.app",
      messagingSenderId: "1091014611581",
      appId: "1:1091014611581:web:9c154005dc64f14be81714",
      measurementId: "G-1E3VZN227W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes/');

    window.salvarNoFirebase = function(dados) {
      set(dbRef, dados);
    };

    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      if (typeof window.atualizarInterface === 'function') {
          window.atualizarInterface(data || []); 
      }
    });
  </script>
</body>
</html>
